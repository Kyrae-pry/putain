 
# Compile automatiquement le plugin et fournit le .jar a telecharger.
# Se declenche a chaque upload de fichier (push) et manuellement.
on:
  push:
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
 
      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
 
      - name: Compiler avec Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon
 
      - name: Recuperer le .jar
        uses: actions/upload-artifact@v4
        with:
          name: HardcoreLives-jar
          path: build/libs/HardcoreLives-*.jar
